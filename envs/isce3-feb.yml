name: isce3-feb
channels:
  - conda-forge
  - nodefaults
dependencies:
  # isce3 currently resolves cleanly on Python 3.12 in conda-forge
  - python=3.12
  - pip
  - ipykernel
  - jupyterlab

  # Core workflow packages
  - isce3=0.25.7
  - compass=0.5.6
  - asf_search=12.0.1
  - dolphin=0.42.2
  - opera-utils=0.25.4

  # Common geospatial stack tools used across course notebooks
  - gdal
  - rasterio
  - rioxarray
  - xarray
  - netcdf4
  - boto3

  # Plotting / notebook UX
  - matplotlib
  - networkx
  - ipympl
  - ipywidgets

  # Other
  - tqdm
