[project]
name = "us_isleofnormandy_s1_asc_t48"
site = "miami_isle_of_normandy"

[aoi]
kml = "miami/aux/bbox.kml"

[search]
platform = "SENTINEL1"
processing_level = "SLC"
beam_mode = "IW"
flight_direction = "ASCENDING"
relative_orbit = 48
start = "2015-09-21T00:00:00Z"
end = "2022-04-30T23:59:59Z"
reference_date = "2015-09-21"
expected_scenes = 20
expected_unique_dates = 20

[selection]
mode = "first_n_from_reference"
max_dates = 20
require_reference = true

[outputs]
root = "miami/insar/us_isleofnormandy_s1_asc_t48/search"
scene_list = "products/scene_names.txt"
metadata_csv = "products/scenes.csv"
summary_json = "products/summary.json"
geojson = "raw/results.geojson"
wkt = "raw/aoi.wkt"

[storage]
slc_dir = "miami/insar/us_isleofnormandy_s1_asc_t48/stack/slc"
download_manifest = "miami/insar/us_isleofnormandy_s1_asc_t48/stack/download_manifest.json"

[ancillary.dem]
file = "miami/insar/us_isleofnormandy_s1_asc_t48/stack/dem/opentopo_srtm_gl1_ellip.tif"
demtype = "SRTMGL1_E"
bbox_buffer_deg = 0.02
vertical_datum = "WGS84_ELLIPSOID"
require_ellipsoid_heights = true

[processing.compass]
work_dir = "miami/insar/us_isleofnormandy_s1_asc_t48/stack/compass"
orbit_dir = "miami/insar/us_isleofnormandy_s1_asc_t48/stack/orbits"
burst_db_file = "miami/insar/us_isleofnormandy_s1_asc_t48/stack/compass/opera-burst-bbox-only.sqlite3"
logs_dir = "miami/insar/us_isleofnormandy_s1_asc_t48/logs/compass"
common_bursts_only = true
browse_image = false
disable_hdf5_file_locking = true
pol = "co-pol"
x_spacing_m = 5.0
y_spacing_m = 10.0
bbox_buffer_deg = 0.02
flatten = true
corrections = true
